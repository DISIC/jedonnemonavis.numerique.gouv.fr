name: Run Cypress Tests

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: jdma
        ports:
          - 5432:5432
      mailhog:
        image: mailhog/mailhog
        ports:
          - 8025:8025
          - 1025:1025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env files
        run: |
          cp webapp-backoffice/.env.example webapp-backoffice/.env
          cp webapp-form/.env.example webapp-form/.env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: |
            webapp-backoffice/yarn.lock
            webapp-form/yarn.lock

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('webapp-backoffice/yarn.lock') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: |
          (cd webapp-backoffice && yarn install) &
          (cd webapp-form && yarn install) &
          wait -n || exit 1
          wait -n || exit 1

      - name: Generate Prisma clients and seed database
        run: |
          (cd webapp-backoffice && npx prisma generate && npx prisma migrate reset --force) &
          (cd webapp-form && npx prisma generate) &
          wait -n || exit 1
          wait -n || exit 1

      - name: Build apps
        run: |
          (cd webapp-backoffice && yarn build) &
          (cd webapp-form && yarn build) &
          wait -n || exit 1
          wait -n || exit 1

      - name: Start apps and wait for readiness
        run: |
          cd webapp-backoffice && nohup yarn start &
          cd webapp-form && nohup yarn startB &
          until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done
          until curl -s http://localhost:3001 > /dev/null 2>&1; do sleep 2; done
          until curl -s http://localhost:8025 > /dev/null 2>&1; do sleep 2; done

      - name: Run Cypress tests
        working-directory: ./webapp-backoffice
        run: npx cypress run --spec "cypress/e2e/jdma/launcher.cy.ts" --browser chrome
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
